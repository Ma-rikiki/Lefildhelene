
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu d'Énigmes - Admin Firebase</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        header {
            background: #dc3545;
            color: white;
            padding: 20px;
            border-bottom: 1px solid #c82333;
        }

        h1 {
            font-size: 1.5em;
            font-weight: 600;
        }

        .admin-badge {
            background: rgba(255,255,255,0.3);
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.9em;
            margin-left: 10px;
        }

        main {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 20px;
            font-size: 1.3em;
            color: #dc3545;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1em;
            font-family: inherit;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #dc3545;
            background: #fafafa;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            background: #dc3545;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            transition: background 0.2s;
        }

        button:hover {
            background: #c82333;
        }

        button.secondary {
            background: #6c757d;
        }

        button.secondary:hover {
            background: #5a6268;
        }

        button.danger {
            background: #721c24;
        }

        button.danger:hover {
            background: #5a1419;
        }

        button.success {
            background: #28a745;
        }

        button.success:hover {
            background: #218838;
        }

        .enigma-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .enigma-item {
            background: #f9f9f9;
            padding: 20px;
            border-left: 4px solid #dc3545;
            border-radius: 4px;
        }

        .enigma-item h3 {
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .enigma-item p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .enigma-answer {
            background: #ffe6e6;
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-weight: 500;
            border-left: 3px solid #dc3545;
        }

        .enigma-actions {
            display: flex;
            gap: 10px;
        }

        .enigma-actions button {
            padding: 8px 16px;
            font-size: 0.9em;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .stats {
            background: #ffe6e6;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 2px solid #dc3545;
        }

        .stats h3 {
            color: #dc3545;
            margin-bottom: 10px;
        }

        .stats p {
            margin: 10px 0;
            font-weight: 500;
        }

        .info-box {
            background: #d1ecf1;
            color: #0c5460;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            border: 1px solid #bee5eb;
        }

        .warning {
            background: #fff3cd;
            color: #856404;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            border: 1px solid #ffeeba;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .nav-buttons button {
            flex: 1;
            min-width: 100px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #dc3545;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-online {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #c3e6cb;
        }

        .status-offline {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #f5c6cb;
        }

        @media (max-width: 600px) {
            main {
                margin: 20px auto;
            }

            .card {
                padding: 20px;
            }

            .nav-buttons {
                flex-direction: column;
            }

            .nav-buttons button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🧩 Énigmes <span class="admin-badge">ADMIN FIREBASE</span></h1>
    </header>

    <main>
        <div class="card">
            <div id="statusDiv" class="status-offline">Connexion à Firebase...</div>

            <div class="nav-buttons">
                <button onclick="logout()" class="secondary">Déconnexion</button>
            </div>

            <h2>➕ Créer une énigme</h2>
            <div>
                <label>Énigme :</label>
                <textarea id="newEnigmaText" placeholder="Écrivez votre énigme ici..."></textarea>

                <label>Réponse :</label>
                <input type="text" id="newEnigmaAnswer" placeholder="La bonne réponse...">

                <button onclick="addEnigma()" style="width: 100%;">➕ Ajouter l'énigme</button>
            </div>

            <h2 style="margin-top: 40px;">📝 Vos énigmes (<span id="enigmaCount">0</span>)</h2>
            <div id="enigmaListContainer" class="enigma-list">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Chargement des énigmes...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js"></script>

    <script>
        // ⚠️ REMPLACEZ CECI PAR VOS IDENTIFIANTS FIREBASE
        const firebaseConfig = {
             apiKey: "AIzaSyCoeIHX3hT-imn031h40BZdCEFfrp8r_es",
  authDomain: "le-fil-d-helene.firebaseapp.com",
  projectId: "le-fil-d-helene",
  storageBucket: "le-fil-d-helene.firebasestorage.app",
  messagingSenderId: "921937045931",
  appId: "1:921937045931:web:f59d10b50d6f11a2bc8aee",
  measurementId: "G-0BMW371QLY"
        };

        // Initialiser Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let enigmas = {};

        function updateStatus(online) {
            const statusDiv = document.getElementById('statusDiv');
            if (online) {
                statusDiv.className = 'status-online';
                statusDiv.textContent = '✓ Connecté à Firebase - Les énigmes sont en ligne !';
            } else {
                statusDiv.className = 'status-offline';
                statusDiv.textContent = '✗ Erreur de connexion Firebase - Vérifiez vos identifiants';
            }
        }

        function loadEnigmas() {
            const container = document.getElementById('enigmaListContainer');
            
            database.ref('enigmas').on('value', (snapshot) => {
                try {
                    updateStatus(true);
                    enigmas = snapshot.val() || {};
                    updateEnigmaList();
                } catch (e) {
                    updateStatus(false);
                    console.error('Erreur Firebase:', e);
                }
            }, (error) => {
                updateStatus(false);
                container.innerHTML = `
                    <div class="warning">
                        ⚠️ Erreur Firebase: ${error.message}<br>
                        Vérifiez que vos identifiants sont corrects.
                    </div>
                `;
                console.error('Erreur:', error);
            });
        }

        function addEnigma() {
            const text = document.getElementById('newEnigmaText').value.trim();
            const answer = document.getElementById('newEnigmaAnswer').value.trim();

            if (!text || !answer) {
                alert('❌ Remplissez les deux champs !');
                return;
            }

            const newId = Date.now().toString();
            const newEnigma = {
                text: text,
                answer: answer.toLowerCase(),
                created: new Date().toISOString()
            };

            database.ref('enigmas/' + newId).set(newEnigma, (error) => {
                if (error) {
                    alert('❌ Erreur lors de l\'ajout: ' + error.message);
                } else {
                    document.getElementById('newEnigmaText').value = '';
                    document.getElementById('newEnigmaAnswer').value = '';
                    alert('✓ Énigme ajoutée !');
                }
            });
        }

        function updateEnigmaList() {
            const container = document.getElementById('enigmaListContainer');
            const count = document.getElementById('enigmaCount');
            const enigmaArray = Object.entries(enigmas);

            count.textContent = enigmaArray.length;

            if (enigmaArray.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>Aucune énigme créée.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = enigmaArray.map(([id, e], index) => `
                <div class="enigma-item">
                    <h3>Énigme ${index + 1}</h3>
                    <p>${e.text}</p>
                    <div class="enigma-answer">Réponse : <strong>${e.answer}</strong></div>
                    <div class="enigma-actions">
                        <button class="danger" onclick="deleteEnigma('${id}')">🗑️ Supprimer</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteEnigma(id) {
            if (confirm('Supprimer cette énigme ?')) {
                database.ref('enigmas/' + id).remove((error) => {
                    if (error) {
                        alert('❌ Erreur lors de la suppression');
                    } else {
                        alert('✓ Énigme supprimée !');
                    }
                });
            }
        }

        function logout() {
            if (confirm('Êtes-vous sûr ?')) {
                alert('Vous avez été déconnecté.');
                location.reload();
            }
        }

        // Initialiser
        loadEnigmas();
    </script>
</body>
</html>
