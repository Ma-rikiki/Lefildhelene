<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Fil d'Hélène · Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);
      --text-sm:clamp(.875rem,.8rem + .35vw,1rem);
      --text-base:clamp(1rem,.95rem + .25vw,1.125rem);
      --text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
      --space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
      --radius-md:.75rem;--radius-lg:1.25rem;--radius-full:9999px;
      --bg:#05131d;--surface:#0a1f2d;--surface-2:#102a3b;--border:rgba(173,223,247,.18);
      --text:#edf8ff;--muted:#9fc5d7;--accent:#6de0d6;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;font-family:'Manrope',system-ui,sans-serif;font-size:var(--text-base);background:linear-gradient(180deg,#061623,#02070b);color:var(--text)}
    a{color:inherit;text-decoration:none}
    header{border-bottom:1px solid var(--border);padding:var(--space-4) 0;background:rgba(4,15,23,.92);backdrop-filter:blur(18px);position:sticky;top:0;z-index:10}
    .shell{width:min(960px,calc(100% - 2rem));margin-inline:auto}
    .top{display:flex;justify-content:space-between;align-items:center;gap:var(--space-4)}
    h1{font-size:var(--text-lg);font-weight:700}
    main{padding:var(--space-6) 0 var(--space-10)}
    .grid{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(0,1fr);gap:var(--space-6)}
    @media (max-width:800px){.grid{grid-template-columns:1fr}}
    .card{background:var(--surface);border-radius:var(--radius-lg);padding:var(--space-6);border:1px solid var(--border);box-shadow:0 16px 40px rgba(0,0,0,.45)}
    label{display:block;font-size:var(--text-sm);margin-bottom:.25rem;color:var(--muted)}
    textarea,input[type="text"]{width:100%;padding:.75rem .9rem;border-radius:var(--radius-md);border:1px solid var(--border);background:rgba(3,12,19,.9);color:var(--text);font:inherit;margin-bottom:var(--space-4)}
    textarea{min-height:120px;resize:vertical}
    button{font:inherit;color:inherit;cursor:pointer;border:none}
    .btn{display:inline-flex;align-items:center;justify-content:center;padding:.85rem 1.3rem;border-radius:var(--radius-full);border:1px solid var(--border);font-size:var(--text-sm);font-weight:600}
    .btn-primary{background:linear-gradient(90deg,var(--accent),#d9bb72);color:#041019}
    .btn-ghost{background:transparent}
    .status{margin-bottom:var(--space-4);font-size:var(--text-sm);color:var(--muted)}
    .status.ok{color:#7ee6d5}
    .status.err{color:#ff9b8a}
    .list{display:grid;gap:var(--space-4);margin-top:var(--space-4);max-height:420px;overflow:auto;padding-right:.25rem}
    .enigma{padding:var(--space-4);border-radius:var(--radius-md);background:var(--surface-2);border:1px solid rgba(255,255,255,.06)}
    .enigma h3{font-size:var(--text-sm);margin-bottom:.15rem}
    .small{font-size:var(--text-xs);color:var(--muted)}
  </style>
</head>
<body>
  <header>
    <div class="shell top">
      <div>
        <h1>Le Fil d'Hélène · Admin</h1>
        <p class="small">Créez et gérez les énigmes stockées dans Firebase Realtime Database.</p>
      </div>
      <a class="btn btn-ghost" href="index.html">⬅ Retour à l'accueil</a>
    </div>
  </header>

  <main class="shell">
    <p class="status" id="status">Connexion à Firebase…</p>
    <div class="grid">
      <section class="card">
        <h2 style="font-size:var(--text-lg);margin-bottom:var(--space-4);">Nouvelle énigme</h2>
        <label for="enonce">Énoncé</label>
        <textarea id="enonce" placeholder="Écrivez l'énigme ici…"></textarea>
        <label for="reponse">Réponse (mot clé)</label>
        <input id="reponse" type="text" placeholder="Réponse attendue" />
        <button class="btn btn-primary" id="addBtn">Enregistrer l'énigme</button>
      </section>
      <section class="card">
        <h2 style="font-size:var(--text-lg);margin-bottom:var(--space-4);">Énigmes existantes</h2>
        <div id="list" class="list"></div>
      </section>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue, push, set, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // ⚠️ IDENTIFIANTS DU PROJET
    const firebaseConfig = {
      apiKey: "AIzaSyCoeIHX3hT-imn031h40BZdCEFfrp8r_es",
      authDomain: "le-fil-d-helene.firebaseapp.com",
      projectId: "le-fil-d-helene",
      storageBucket: "le-fil-d-helene.firebasestorage.app",
      messagingSenderId: "921937045931",
      appId: "1:921937045931:web:f59d10b50d6f11a2bc8aee",
      measurementId: "G-0BMW371QLY"
    };

    const app = initializeApp(firebaseConfig);
    // ⚠️ IMPORTANT : remplace "VOTRE_DATABASE_URL" par l'URL exacte de ta Realtime Database
    // Exemple : https://le-fil-d-helene-default-rtdb.europe-west1.firebasedatabase.app
    const db = getDatabase(app, "https://le-fil-d-helene-default-rtdb.europe-west1.firebasedatabase.app");

    const statusEl = document.getElementById('status');
    const listEl = document.getElementById('list');
    const enonceEl = document.getElementById('enonce');
    const reponseEl = document.getElementById('reponse');
    const addBtn = document.getElementById('addBtn');

    function setStatus(msg, ok = false, err = false) {
      statusEl.textContent = msg;
      statusEl.classList.toggle('ok', ok);
      statusEl.classList.toggle('err', err);
    }

    try {
      const enigmasRef = ref(db, 'enigmas');

      onValue(enigmasRef, (snapshot) => {
        const data = snapshot.val() || {};
        listEl.innerHTML = '';
        const entries = Object.entries(data);
        if (!entries.length) {
          listEl.innerHTML = '<p class="small">Aucune énigme enregistrée pour le moment.</p>';
        } else {
          for (const [id, e] of entries) {
            const item = document.createElement('article');
            item.className = 'enigma';
            item.innerHTML = `
              <h3>${e.text || ''}</h3>
              <p class="small">Réponse&nbsp;: <strong>${e.answer || ''}</strong></p>
              <button class="btn btn-ghost" data-id="${id}">🗑 Supprimer</button>
            `;
            listEl.appendChild(item);
          }
        }
        setStatus('Connecté à Firebase ✓', true, false);
      }, (error) => {
        console.error(error);
        setStatus('Erreur de lecture Firebase : ' + error.message, false, true);
      });

      addBtn.addEventListener('click', async () => {
        const text = enonceEl.value.trim();
        const answer = reponseEl.value.trim().toLowerCase();
        if (!text || !answer) {
          alert('Merci de remplir les deux champs.');
          return;
        }
        try {
          const newRef = push(enigmasRef);
          await set(newRef, { text, answer, createdAt: Date.now() });
          enonceEl.value = '';
          reponseEl.value = '';
        } catch (e) {
          console.error(e);
          setStatus("Erreur lors de l'enregistrement : " + e.message, false, true);
        }
      });

      listEl.addEventListener('click', async (e) => {
        const btn = e.target.closest('button[data-id]');
        if (!btn) return;
        const id = btn.getAttribute('data-id');
        if (!confirm('Supprimer cette énigme ?')) return;
        try {
          await remove(ref(db, 'enigmas/' + id));
        } catch (err) {
          console.error(err);
          setStatus('Erreur lors de la suppression : ' + err.message, false, true);
        }
      });

    } catch (e) {
      console.error(e);
      setStatus("Erreur d'initialisation Firebase : " + e.message, false, true);
    }
  </script>
</body>
</html>
