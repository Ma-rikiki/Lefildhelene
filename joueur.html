<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Fil d'Hélène · Joueur</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);
      --text-sm:clamp(.875rem,.8rem + .35vw,1rem);
      --text-base:clamp(1rem,.95rem + .25vw,1.125rem);
      --text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
      --space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
      --radius-md:.75rem;--radius-lg:1.25rem;--radius-full:9999px;
      --bg:#020910;--surface:#061623;--surface-2:#0c2335;--border:rgba(173,223,247,.2);
      --text:#edf8ff;--muted:#9fc5d7;--accent:#6de0d6;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;font-family:'Manrope',system-ui,sans-serif;font-size:var(--text-base);background:radial-gradient(circle at top,#112b3f,#020910);color:var(--text)}
    a{color:inherit;text-decoration:none}
    header{border-bottom:1px solid var(--border);padding:var(--space-4) 0;background:rgba(4,15,23,.96);backdrop-filter:blur(18px);position:sticky;top:0;z-index:10}
    .shell{width:min(960px,calc(100% - 2rem));margin-inline:auto}
    .top{display:flex;justify-content:space-between;align-items:center;gap:var(--space-4)}
    h1{font-size:var(--text-lg);font-weight:700}
    main{padding:var(--space-6) 0 var(--space-10)}
    .card{background:var(--surface);border-radius:var(--radius-lg);padding:var(--space-6);border:1px solid var(--border);box-shadow:0 16px 40px rgba(0,0,0,.5)}
    .status{margin-bottom:var(--space-4);font-size:var(--text-sm);color:var(--muted)}
    .status.ok{color:#7ee6d5}
    .status.err{color:#ff9b8a}
    .enonce{font-size:var(--text-lg);margin-bottom:var(--space-4)}
    input[type="text"]{width:100%;padding:.85rem 1rem;border-radius:var(--radius-md);border:1px solid var(--border);background:rgba(4,15,23,.96);color:var(--text);font:inherit;margin-bottom:var(--space-4)}
    .btn{display:inline-flex;align-items:center;justify-content:center;padding:.9rem 1.4rem;border-radius:var(--radius-full);border:1px solid var(--border);font-size:var(--text-sm);font-weight:600;cursor:pointer}
    .btn-primary{background:linear-gradient(90deg,var(--accent),#d9bb72);color:#041019}
    .btn-ghost{background:transparent}
    .feedback{min-height:2rem;font-size:var(--text-sm);margin-top:.25rem}
    .score{margin-top:var(--space-4);font-size:var(--text-sm);color:var(--muted)}
  </style>
</head>
<body>
  <header>
    <div class="shell top">
      <div>
        <h1>Le Fil d'Hélène · Joueur</h1>
        <p class="status" id="status">Chargement des énigmes…</p>
      </div>
      <a class="btn btn-ghost" href="index.html">⬅ Accueil</a>
    </div>
  </header>

  <main class="shell">
    <section class="card">
      <p id="enonce" class="enonce">En attente des énigmes…</p>
      <input id="reponse" type="text" placeholder="Votre réponse" autocomplete="off" />
      <div style="display:flex;gap:var(--space-3);margin-bottom:var(--space-2);">
        <button class="btn btn-primary" id="validerBtn">Valider</button>
        <button class="btn btn-ghost" id="suivantBtn" disabled>Énigme suivante</button>
      </div>
      <div id="feedback" class="feedback"></div>
      <p class="score">Énigme <span id="position">0</span>/<span id="total">0</span> · Score : <span id="score">0</span></p>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCoeIHX3hT-imn031h40BZdCEFfrp8r_es",
      authDomain: "le-fil-d-helene.firebaseapp.com",
      projectId: "le-fil-d-helene",
      storageBucket: "le-fil-d-helene.firebasestorage.app",
      messagingSenderId: "921937045931",
      appId: "1:921937045931:web:f59d10b50d6f11a2bc8aee",
      measurementId: "G-0BMW371QLY"
    };

    const app = initializeApp(firebaseConfig);
    // ⚠️ même URL que dans admin.html
    const db = getDatabase(app, "https://le-fil-d-helene-default-rtdb.europe-west1.firebasedatabase.app");

    const statusEl = document.getElementById('status');
    const enonceEl = document.getElementById('enonce');
    const reponseEl = document.getElementById('reponse');
    const validerBtn = document.getElementById('validerBtn');
    const suivantBtn = document.getElementById('suivantBtn');
    const feedbackEl = document.getElementById('feedback');
    const posEl = document.getElementById('position');
    const totalEl = document.getElementById('total');
    const scoreEl = document.getElementById('score');

    let enigmes = [];
    let index = 0;
    let score = 0;
    let dejaValide = false;

    function setStatus(msg, ok = false, err = false) {
      statusEl.textContent = msg;
      statusEl.classList.toggle('ok', ok);
      statusEl.classList.toggle('err', err);
    }

    function afficherEnigme() {
      if (!enigmes.length) {
        enonceEl.textContent = "Aucune énigme n'est disponible pour le moment.";
        posEl.textContent = '0';
        totalEl.textContent = '0';
        validerBtn.disabled = true;
        return;
      }
      const e = enigmes[index];
      enonceEl.textContent = e.text || '';
      posEl.textContent = String(index + 1);
      totalEl.textContent = String(enigmes.length);
      reponseEl.value = '';
      feedbackEl.textContent = '';
      dejaValide = false;
      suivantBtn.disabled = true;
      validerBtn.disabled = false;
    }

    try {
      const enigmasRef = ref(db, 'enigmas');
      onValue(enigmasRef, (snapshot) => {
        const data = snapshot.val() || {};
        enigmes = Object.values(data);
        if (!enigmes.length) {
          setStatus("Connecté, mais aucune énigme n'est encore enregistrée.", true, false);
        } else {
          setStatus("Connecté à Firebase ✓", true, false);
        }
        index = 0;
        afficherEnigme();
      }, (error) => {
        console.error(error);
        setStatus('Erreur de lecture Firebase : ' + error.message, false, true);
      });

      validerBtn.addEventListener('click', () => {
        if (!enigmes.length || dejaValide) return;
        const saisie = (reponseEl.value || '').trim().toLowerCase();
        const attendu = (enigmes[index].answer || '').trim().toLowerCase();
        if (!saisie) return;
        if (saisie === attendu) {
          feedbackEl.textContent = 'Bonne réponse !';
          feedbackEl.style.color = '#7ee6d5';
          score += 10;
          scoreEl.textContent = String(score);
          dejaValide = true;
          suivantBtn.disabled = false;
          validerBtn.disabled = true;
        } else {
          feedbackEl.textContent = "Ce n'est pas tout à fait ça…";
          feedbackEl.style.color = '#ff9b8a';
        }
      });

      suivantBtn.addEventListener('click', () => {
        if (!enigmes.length) return;
        index = (index + 1) % enigmes.length;
        afficherEnigme();
      });

    } catch (e) {
      console.error(e);
      setStatus("Erreur d'initialisation Firebase : " + e.message, false, true);
    }
  </script>
</body>
</html>
